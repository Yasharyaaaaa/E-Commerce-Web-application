services:
  - type: web
    name: shoptalk-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Set these in the Render dashboard (Environment tab) — do NOT commit secrets:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ACCESS_EXPIRES_IN
        value: 15m
      - key: REFRESH_SECRET
        sync: false
      - key: REFRESH_EXPIRES_IN
        value: 7d
      - key: COOKIE_EXPIRES_IN
        value: "1"
      - key: REDIS_URL
        sync: false
      - key: CLIENT_URL
        sync: false   # your frontend origin(s), comma-separated
      - key: PAYMENT_API_KEY
        sync: false
      - key: PAYMENT_API_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
